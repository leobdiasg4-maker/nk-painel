<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>NK Painel Operacional</title>
<style>
  :root {
    --bg: #f5f4f0; --surface: #ffffff; --surface2: #f9f8f5;
    --border: rgba(0,0,0,0.1); --border-strong: rgba(0,0,0,0.18);
    --text: #1a1a18; --text2: #5a5a56; --text3: #8a8a84;
    --accent: #1a6b3a; --accent-bg: #e8f5ee; --accent-text: #1a6b3a;
    --red: #c0392b; --red-bg: #fdecea; --amber: #b45309; --amber-bg: #fef3cd;
    --blue: #1a5276; --blue-bg: #eaf2fb; --gray-bg: #f0efeb;
    --radius: 12px; --nav-h: 60px; --top-h: 56px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; max-width: 480px; margin: 0 auto; }
  .topbar { position: fixed; top: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; height: var(--top-h); background: var(--surface); border-bottom: 0.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 16px; z-index: 100; }
  .topbar-title { font-size: 17px; font-weight: 600; }
  .topbar-sub { font-size: 12px; color: var(--text3); margin-top: 1px; }
  .topbar-left { display: flex; flex-direction: column; }
  .btn-icon { width: 36px; height: 36px; border-radius: 50%; border: none; background: var(--surface2); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; }
  .nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; height: var(--nav-h); background: var(--surface); border-top: 0.5px solid var(--border); display: flex; z-index: 100; }
  .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; cursor: pointer; border: none; background: none; color: var(--text3); font-size: 11px; font-weight: 500; padding: 8px 4px; }
  .nav-item.active { color: var(--accent); }
  .nav-icon { font-size: 22px; line-height: 1; }
  .content { padding-top: calc(var(--top-h) + 12px); padding-bottom: calc(var(--nav-h) + 12px); min-height: 100vh; }
  .page { display: none; padding: 0 12px; }
  .page.active { display: block; }
  .sec-header { display: flex; align-items: center; justify-content: space-between; padding: 4px 4px 10px; }
  .sec-title { font-size: 13px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; }
  .sec-count { font-size: 12px; color: var(--text3); background: var(--gray-bg); border-radius: 20px; padding: 2px 8px; }
  .card { background: var(--surface); border-radius: var(--radius); border: 0.5px solid var(--border); padding: 14px 16px; margin-bottom: 8px; cursor: pointer; }
  .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 6px; }
  .card-local { font-size: 15px; font-weight: 600; line-height: 1.3; flex: 1; }
  .card-desc { font-size: 13px; color: var(--text2); margin-bottom: 8px; line-height: 1.4; }
  .card-footer { display: flex; align-items: center; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
  .badge { font-size: 11px; font-weight: 500; padding: 3px 8px; border-radius: 20px; white-space: nowrap; }
  .badge-red { background: var(--red-bg); color: var(--red); }
  .badge-amber { background: var(--amber-bg); color: var(--amber); }
  .badge-green { background: var(--accent-bg); color: var(--accent-text); }
  .badge-blue { background: var(--blue-bg); color: var(--blue); }
  .badge-gray { background: var(--gray-bg); color: var(--text2); }
  .tarefa-card { background: var(--surface); border-radius: 10px; border: 0.5px solid var(--border); padding: 12px 14px; margin-bottom: 6px; }
  .tarefa-obra { font-size: 11px; color: var(--text3); margin-bottom: 2px; }
  .tarefa-desc { font-size: 14px; font-weight: 500; margin-bottom: 6px; }
  .tarefa-footer { display: flex; align-items: center; gap: 6px; }
  .tarefa-card.concluida { opacity: 0.5; }
  .empty { text-align: center; padding: 48px 24px; color: var(--text3); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-text { font-size: 15px; }
  .loading { text-align: center; padding: 48px; color: var(--text3); font-size: 15px; }
  .fab { position: fixed; bottom: calc(var(--nav-h) + 16px); right: 16px; width: 52px; height: 52px; border-radius: 50%; background: var(--accent); border: none; color: #fff; font-size: 26px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 12px rgba(26,107,58,0.3); z-index: 90; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; display: none; align-items: flex-end; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border-radius: 20px 20px 0 0; width: 100%; max-width: 480px; margin: 0 auto; padding: 20px 16px 32px; max-height: 90vh; overflow-y: auto; }
  .modal-handle { width: 36px; height: 4px; background: var(--border-strong); border-radius: 2px; margin: 0 auto 16px; }
  .modal-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 5px; display: block; }
  .form-input { width: 100%; padding: 10px 12px; border-radius: 10px; border: 0.5px solid var(--border-strong); background: var(--surface2); font-size: 15px; color: var(--text); font-family: inherit; outline: none; }
  .form-input:focus { border-color: var(--accent); }
  select.form-input { -webkit-appearance: none; appearance: none; }
  textarea.form-input { resize: none; min-height: 72px; }
  .btn-primary { width: 100%; padding: 14px; border-radius: 12px; background: var(--accent); color: #fff; border: none; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 4px; }
  .btn-secondary { width: 100%; padding: 12px; border-radius: 12px; background: var(--gray-bg); color: var(--text2); border: none; font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 8px; }
  .btn-danger { width: 100%; padding: 12px; border-radius: 12px; background: var(--red-bg); color: var(--red); border: none; font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 8px; display: none; }
  .modal-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .detail-header { background: var(--surface); border-radius: var(--radius); border: 0.5px solid var(--border); padding: 16px; margin-bottom: 12px; }
  .detail-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .detail-sub { font-size: 14px; color: var(--text2); margin-bottom: 12px; }
  .detail-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .meta-item { background: var(--surface2); border-radius: 8px; padding: 8px 10px; }
  .meta-label { font-size: 11px; color: var(--text3); margin-bottom: 2px; }
  .meta-value { font-size: 13px; font-weight: 500; }
  .back-btn { display: flex; align-items: center; gap: 6px; background: none; border: none; color: var(--accent); font-size: 15px; font-weight: 500; cursor: pointer; padding: 4px 0 12px; }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
  .stat-card { background: var(--surface); border-radius: var(--radius); border: 0.5px solid var(--border); padding: 14px; }
  .stat-n { font-size: 26px; font-weight: 700; }
  .stat-label { font-size: 12px; color: var(--text3); margin-top: 2px; }
  .sec-divider { display: flex; align-items: center; gap: 10px; margin: 16px 0 10px; }
  .sec-divider-line { flex: 1; height: 0.5px; background: var(--border); }
  .sec-divider-text { font-size: 12px; color: var(--text3); font-weight: 500; white-space: nowrap; }
  .tipo-chip { display: inline-flex; font-size: 11px; padding: 2px 7px; border-radius: 6px; font-weight: 500; }
  .tipo-campo { background: #e8f5ee; color: #1a6b3a; }
  .tipo-compra { background: #fef3cd; color: #b45309; }
  .tipo-admin { background: #eaf2fb; color: #1a5276; }
  .tipo-cliente { background: #fdecea; color: #c0392b; }
  .check-circle { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border-strong); display: flex; align-items: center; justify-content: center; flex-shrink: 0; cursor: pointer; font-size: 13px; }
  .check-circle.done { background: var(--accent); border-color: var(--accent); color: #fff; }
  .edit-btn { margin-left: auto; background: none; border: 0.5px solid var(--border); font-size: 12px; color: var(--text3); cursor: pointer; padding: 2px 8px; border-radius: 6px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left" id="topbar-left">
    <span class="topbar-title">NK Painel</span>
    <span class="topbar-sub">Hoje, <span id="data-hoje"></span></span>
  </div>
  <button class="btn-icon" onclick="openShare()">📤</button>
</div>

<div class="content">
  <div class="page active" id="page-home"><div id="home-content"><div class="loading">Carregando...</div></div></div>
  <div class="page" id="page-obras"><div id="obras-content"><div class="loading">Carregando...</div></div></div>
  <div class="page" id="page-detail"><div id="detail-content"></div></div>
  <div class="page" id="page-config">
    <div style="padding:8px 4px">
      <div class="stat-card" style="margin-bottom:12px">
        <div style="font-size:14px;font-weight:600;margin-bottom:8px">URL do Apps Script</div>
        <input class="form-input" id="api-url" style="font-size:13px" oninput="salvarConfig()">
        <div style="font-size:12px;color:var(--text3);margin-top:6px">Cole a URL gerada em Implantar > Gerenciar implantações</div>
      </div>
      <div class="stat-card" style="margin-bottom:12px">
        <div style="font-size:14px;font-weight:600;margin-bottom:4px">Status da conexão</div>
        <div style="font-size:13px;color:var(--text3)" id="conn-status">—</div>
      </div>
      <button class="btn-primary" onclick="testarConexao()">Testar conexão</button>
      <button class="btn-secondary" onclick="recarregarTudo()">Recarregar dados</button>
      <div class="stat-card" style="margin-top:12px">
        <div style="font-size:14px;font-weight:600;margin-bottom:10px">Responsáveis</div>
        <div id="lista-responsaveis" style="margin-bottom:10px"></div>
        <div style="display:flex;gap:8px">
          <input class="form-input" id="novo-responsavel" placeholder="Nome do responsável" style="flex:1">
          <button onclick="adicionarResponsavel()" style="padding:10px 14px;border-radius:10px;background:var(--accent);color:#fff;border:none;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap">+ Add</button>
        </div>
      </div>
    </div>
  </div>
</div>

<nav class="nav">
  <button class="nav-item active" onclick="navTo('home')" id="nav-home"><span class="nav-icon">🏠</span><span>Hoje</span></button>
  <button class="nav-item" onclick="navTo('obras')" id="nav-obras"><span class="nav-icon">🏗️</span><span>Obras</span></button>
  <button class="nav-item" onclick="navTo('config')" id="nav-config"><span class="nav-icon">⚙️</span><span>Config</span></button>
</nav>

<button class="fab" id="fab" onclick="fabClick()" style="display:none">＋</button>

<!-- MODAL OBRA -->
<div class="modal-overlay" id="modal-obra">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="obra-modal-title">Nova obra</div>
    <input type="hidden" id="obra-id-edit">
    <div class="form-group"><label class="form-label">Unidade *</label><input class="form-input" id="obra-unidade" placeholder="ex: Guarulhos"></div>
    <div class="form-group"><label class="form-label">Descrição *</label><input class="form-input" id="obra-desc" placeholder="ex: Manutenção Telhado"></div>
    <div class="modal-row">
      <div class="form-group"><label class="form-label">Tipo</label><select class="form-input" id="obra-tipo"><option>Servico</option><option>Orcamento</option></select></div>
      <div class="form-group"><label class="form-label">Origem</label><select class="form-input" id="obra-origem"><option>Cogna</option><option>Unidade</option></select></div>
    </div>
    <div class="form-group"><label class="form-label">Status</label>
      <select class="form-input" id="obra-status">
        <option>Orcamento em aberto</option><option>Aguardando SESMT</option><option>Aprovado - Nao iniciado</option>
        <option>Em execucao</option><option>Finalizacao</option><option>Entregue</option><option>Cancelado</option>
      </select>
    </div>
    <div class="modal-row">
      <div class="form-group"><label class="form-label">Contato</label><input class="form-input" id="obra-contato" placeholder="Manoel, Ana..."></div>
      <div class="form-group"><label class="form-label">Responsável</label><select class="form-input" id="obra-responsavel"></select></div>
    </div>
    <div class="modal-row">
      <div class="form-group"><label class="form-label">RC</label><input class="form-input" id="obra-rc" placeholder="Opcional"></div>
      <div class="form-group"><label class="form-label">Pedido</label><input class="form-input" id="obra-pedido" placeholder="Opcional"></div>
    </div>
    <div class="form-group"><label class="form-label">Nota Fiscal</label><input class="form-input" id="obra-nf" placeholder="Opcional"></div>
    <div class="form-group"><label class="form-label">Observações</label><textarea class="form-input" id="obra-obs" placeholder="Notas gerais..."></textarea></div>
    <button class="btn-primary" onclick="salvarObra()">Salvar obra</button>
    <button class="btn-secondary" onclick="fecharModal('modal-obra')">Cancelar</button>
  </div>
</div>

<!-- MODAL TAREFA -->
<div class="modal-overlay" id="modal-tarefa">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="tarefa-modal-title">Nova tarefa</div>
    <input type="hidden" id="tarefa-id-edit">
    <input type="hidden" id="tarefa-obra-id">
    <div class="form-group"><label class="form-label">Descrição *</label><input class="form-input" id="tarefa-desc" placeholder="O que precisa ser feito?"></div>
    <div class="modal-row">
      <div class="form-group"><label class="form-label">Tipo</label>
        <select class="form-input" id="tarefa-tipo"><option>Campo</option><option>Compra</option><option>Administrativo</option><option>Cliente</option></select>
      </div>
      <div class="form-group"><label class="form-label">Responsável</label><select class="form-input" id="tarefa-responsavel"></select></div>
    </div>
    <div class="form-group"><label class="form-label">Data limite</label><input class="form-input" type="date" id="tarefa-data"></div>
    <div class="form-group"><label class="form-label">Observações</label><textarea class="form-input" id="tarefa-obs" placeholder="Detalhes..."></textarea></div>
    <button class="btn-primary" onclick="salvarTarefa()">Salvar tarefa</button>
    <button class="btn-danger" id="btn-excluir-tarefa" onclick="excluirTarefa()">Excluir tarefa</button>
    <button class="btn-secondary" onclick="fecharModal('modal-tarefa')">Cancelar</button>
  </div>
</div>

<!-- MODAL SHARE -->
<div class="modal-overlay" id="modal-share">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Compartilhar resumo</div>
    <textarea class="form-input" id="share-text" style="min-height:200px;font-size:13px" readonly></textarea>
    <button class="btn-primary" onclick="copiarShare()">Copiar texto</button>
    <button class="btn-secondary" onclick="fecharModal('modal-share')">Fechar</button>
  </div>
</div>

<script>
const API_URL_DEFAULT = 'https://script.google.com/macros/s/AKfycbxRAPLJ-IRRFl5tbRBocjl0R0hVnHKPZN1qAt9rGgpEKrgrlDIDpRzNvzg0NjJkdutXyQ/exec';
let API_URL = localStorage.getItem('nk_api_url') || API_URL_DEFAULT;
let obras = [], tarefas = [], responsaveis = ['Leonardo','Nicanor'];
let currentPage = 'home', currentObraId = null;

const STATUS_LABELS = {
  'Orcamento em aberto':'Orçamento em aberto','Aguardando SESMT':'Aguardando SESMT',
  'Aprovado - Nao iniciado':'Aprovado — não iniciado','Em execucao':'Em execução',
  'Finalizacao':'Finalização','Entregue':'Entregue','Cancelado':'Cancelado'
};
const STATUS_CLS = {
  'Orcamento em aberto':'badge-blue','Aguardando SESMT':'badge-amber',
  'Aprovado - Nao iniciado':'badge-gray','Em execucao':'badge-green',
  'Finalizacao':'badge-amber','Entregue':'badge-gray','Cancelado':'badge-red'
};
const TIPO_CLS = {Campo:'tipo-campo',Compra:'tipo-compra',Administrativo:'tipo-admin',Cliente:'tipo-cliente'};

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('data-hoje').textContent = new Date().toLocaleDateString('pt-BR',{day:'numeric',month:'short'});
  document.getElementById('api-url').value = API_URL;
  carregarDados();
});

function salvarConfig() {
  API_URL = document.getElementById('api-url').value.trim();
  localStorage.setItem('nk_api_url', API_URL);
}

function navTo(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  const navEl = document.getElementById('nav-'+page);
  if (navEl) navEl.classList.add('active');
  currentPage = page;
  const topLeft = document.getElementById('topbar-left');
  const fab = document.getElementById('fab');
  if (page === 'home') {
    topLeft.innerHTML = '<span class="topbar-title">NK Painel</span><span class="topbar-sub">Hoje, <span id="data-hoje"></span></span>';
    document.getElementById('data-hoje').textContent = new Date().toLocaleDateString('pt-BR',{day:'numeric',month:'short'});
    fab.style.display = 'none';
  } else if (page === 'obras') {
    topLeft.innerHTML = '<span class="topbar-title">Obras</span><span class="topbar-sub">'+obras.length+' ativas</span>';
    fab.style.display = 'flex';
    renderObras();
  } else if (page === 'config') {
    topLeft.innerHTML = '<span class="topbar-title">Configurações</span>';
    fab.style.display = 'none';
  }
}

function fabClick() {
  if (currentPage === 'obras') abrirModalObra();
  else if (currentPage === 'detail') abrirModalTarefa(currentObraId);
}

function api(params) {
  return new Promise((resolve, reject) => {
    const cbName = 'cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    const timeout = setTimeout(() => {
      delete window[cbName];
      const s = document.getElementById(cbName);
      if (s) s.remove();
      reject(new Error('Timeout — verifique a conexão'));
    }, 15000);
    window[cbName] = (data) => {
      clearTimeout(timeout);
      delete window[cbName];
      const s = document.getElementById(cbName);
      if (s) s.remove();
      if (data.error) reject(new Error(data.error));
      else resolve(data);
    };
    const p = new URLSearchParams({...params, callback: cbName});
    const script = document.createElement('script');
    script.id = cbName;
    script.src = API_URL + '?' + p.toString();
    script.onerror = () => {
      clearTimeout(timeout);
      delete window[cbName];
      script.remove();
      reject(new Error('Erro de conexão com o servidor'));
    };
    document.head.appendChild(script);
  });
}

async function carregarDados() {
  try {
    document.getElementById('home-content').innerHTML = '<div class="loading">Iniciando...</div>';
    await new Promise(r => setTimeout(r, 100));
    document.getElementById('home-content').innerHTML = '<div class="loading">Carregando obras...</div>';
    obras = await api({action:'getObras'});
    document.getElementById('home-content').innerHTML = '<div class="loading">Carregando tarefas...</div>';
    tarefas = await api({action:'getAllTarefas'});
    document.getElementById('home-content').innerHTML = '<div class="loading">Carregando responsáveis...</div>';
    const r = await api({action:'getResponsaveis'});
    if (r && r.length) responsaveis = r;
    renderHome(); renderObras(); preencherSelects(); renderResponsaveis();
  } catch(e) {
    document.getElementById('home-content').innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-text">Erro ao carregar.<br><small>'+e.message+'</small><br><br>Vá em ⚙️ e teste a conexão.</div></div>';
  }
}

function recarregarTudo() { carregarDados(); }

async function testarConexao() {
  const el = document.getElementById('conn-status');
  el.textContent = 'Testando...'; el.style.color = 'var(--text3)';
  try {
    const r = await api({action:'getObras'});
    el.textContent = '✅ Conectado — '+r.length+' obras'; el.style.color = 'var(--accent)';
    carregarDados();
  } catch(e) { el.textContent = '❌ Erro: '+e.message; el.style.color = 'var(--red)'; }
}

function renderHome() {
  const hoje = new Date(); hoje.setHours(0,0,0,0);
  const comData = tarefas.filter(t => t.Status !== 'Concluida' && t.DataLimite).sort((a,b) => new Date(a.DataLimite)-new Date(b.DataLimite));
  const semData = tarefas.filter(t => t.Status !== 'Concluida' && !t.DataLimite);
  const urgentes = comData.filter(t => { const d=new Date(t.DataLimite); d.setHours(0,0,0,0); return d<=hoje; }).length;
  let html = '<div class="stats-grid"><div class="stat-card"><div class="stat-n">'+obras.length+'</div><div class="stat-label">Obras ativas</div></div><div class="stat-card"><div class="stat-n" style="color:'+(urgentes>0?'var(--red)':'var(--text)')+'">'+urgentes+'</div><div class="stat-label">Ações urgentes</div></div></div>';
  if (comData.length) { html += '<div class="sec-header"><span class="sec-title">Com prazo</span><span class="sec-count">'+comData.length+'</span></div>'; comData.forEach(t => { html += renderTarefaCard(t, hoje); }); }
  if (semData.length) { html += '<div class="sec-divider"><div class="sec-divider-line"></div><span class="sec-divider-text">Sem data definida</span><div class="sec-divider-line"></div></div><div class="sec-header"><span class="sec-title">Pendentes</span><span class="sec-count">'+semData.length+'</span></div>'; semData.forEach(t => { html += renderTarefaCard(t, hoje); }); }
  if (!comData.length && !semData.length) html += '<div class="empty"><div class="empty-icon">✅</div><div class="empty-text">Nenhuma tarefa pendente!<br>Adicione tarefas nas obras.</div></div>';
  document.getElementById('home-content').innerHTML = html;
}

function renderTarefaCard(t, hoje) {
  const obra = obras.find(o => o.ID === t.ObraID);
  const obraLabel = obra ? obra.Unidade+' — '+obra.Descricao : t.ObraID;
  let dateLabel = '', dateClass = 'ok';
  if (t.DataLimite) {
    const d = new Date(t.DataLimite); d.setHours(0,0,0,0);
    const diff = Math.round((d-hoje)/86400000);
    if (diff < 0) { dateLabel='Venceu há '+Math.abs(diff)+'d'; dateClass='red'; }
    else if (diff === 0) { dateLabel='Hoje'; dateClass='red'; }
    else if (diff === 1) { dateLabel='Amanhã'; dateClass='future'; }
    else { dateLabel=d.toLocaleDateString('pt-BR',{day:'numeric',month:'short'}); dateClass=diff<=7?'future':'ok'; }
  }
  const tipoCls = TIPO_CLS[t.Tipo] || 'tipo-admin';
  return '<div class="tarefa-card" onclick="abrirObra(\''+t.ObraID+'\')">'
    +'<div class="tarefa-obra">'+obraLabel+'</div>'
    +'<div class="tarefa-desc">'+t.Descricao+'</div>'
    +'<div class="tarefa-footer"><span class="tipo-chip '+tipoCls+'">'+t.Tipo+'</span>'
    +(dateLabel?'<span style="font-size:12px;color:var(--'+dateClass+')">'+dateLabel+'</span>':'')
    +'<span style="font-size:12px;color:var(--text3);margin-left:auto">'+( t.Responsavel||'')+'</span></div></div>';
}

function renderObras() {
  if (!obras.length) { document.getElementById('obras-content').innerHTML = '<div class="empty"><div class="empty-icon">🏗️</div><div class="empty-text">Nenhuma obra.<br>Toque em + para adicionar.</div></div>'; return; }
  const ordem = ['Em execucao','Finalizacao','Aguardando SESMT','Aprovado - Nao iniciado','Orcamento em aberto','Entregue','Cancelado'];
  const grupos = {}; ordem.forEach(s => grupos[s]=[]);
  obras.forEach(o => { if (grupos[o.Status]) grupos[o.Status].push(o); else grupos['Entregue'].push(o); });
  let html = '';
  ordem.forEach(status => {
    const g = grupos[status]; if (!g.length) return;
    html += '<div class="sec-header"><span class="sec-title">'+(STATUS_LABELS[status]||status)+'</span><span class="sec-count">'+g.length+'</span></div>';
    g.forEach(o => {
      const n = tarefas.filter(t => t.ObraID===o.ID && t.Status!=='Concluida').length;
      html += '<div class="card" onclick="abrirObra(\''+o.ID+'\')"><div class="card-header"><span class="card-local">'+o.Unidade+'</span><span class="badge '+(STATUS_CLS[o.Status]||'badge-gray')+'">'+(STATUS_LABELS[o.Status]||o.Status)+'</span></div>'
        +'<div class="card-desc">'+o.Descricao+'</div>'
        +'<div class="card-footer"><span class="badge badge-gray">'+(o.Origem||'')+'</span>'
        +(o.Contato?'<span class="badge badge-gray">'+o.Contato+'</span>':'')
        +(n>0?'<span class="badge badge-amber" style="margin-left:auto">'+n+' tarefa'+(n>1?'s':'')+'</span>':'')
        +'</div></div>';
    });
  });
  document.getElementById('obras-content').innerHTML = html;
}

function abrirObra(obraId) {
  currentObraId = obraId;
  const obra = obras.find(o => o.ID===obraId); if (!obra) return;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-detail').classList.add('active');
  document.getElementById('fab').style.display = 'flex';
  document.getElementById('topbar-left').innerHTML = '<button class="back-btn" onclick="voltarObras()">← Obras</button>';
  currentPage = 'detail';
  renderDetalheObra(obra);
}

function voltarObras() { currentObraId = null; navTo('obras'); }

function renderDetalheObra(obra) {
  const pendentes = tarefas.filter(t => t.ObraID===obra.ID && t.Status!=='Concluida');
  const concluidas = tarefas.filter(t => t.ObraID===obra.ID && t.Status==='Concluida');
  const tipos = ['Campo','Compra','Administrativo','Cliente'];
  let html = '<div class="detail-header">'
    +'<div class="detail-title">'+obra.Unidade+'</div>'
    +'<div class="detail-sub">'+obra.Descricao+'</div>'
    +'<div class="detail-meta">'
    +'<div class="meta-item"><div class="meta-label">Status</div><div class="meta-value">'+(STATUS_LABELS[obra.Status]||obra.Status)+'</div></div>'
    +'<div class="meta-item"><div class="meta-label">Origem</div><div class="meta-value">'+(obra.Origem||'—')+'</div></div>'
    +'<div class="meta-item"><div class="meta-label">Contato</div><div class="meta-value">'+(obra.Contato||'—')+'</div></div>'
    +'<div class="meta-item"><div class="meta-label">Responsável</div><div class="meta-value">'+(obra.Responsavel||'—')+'</div></div>'
    +(obra.RC?'<div class="meta-item"><div class="meta-label">RC</div><div class="meta-value">'+obra.RC+'</div></div>':'')
    +(obra.Pedido?'<div class="meta-item"><div class="meta-label">Pedido</div><div class="meta-value">'+obra.Pedido+'</div></div>':'')
    +(obra.NotaFiscal?'<div class="meta-item"><div class="meta-label">NF</div><div class="meta-value">'+obra.NotaFiscal+'</div></div>':'')
    +'</div>'
    +(obra.Observacoes?'<div style="margin-top:10px;font-size:13px;color:var(--text2);background:var(--surface2);border-radius:8px;padding:8px 10px">'+obra.Observacoes+'</div>':'')
    +'<div style="display:flex;gap:8px;margin-top:12px">'
    +'<button class="btn-secondary" style="flex:1;margin:0" onclick="editarObra(\''+obra.ID+'\')">Editar obra</button>'
    +'<button class="btn-primary" style="flex:1;margin:0" onclick="abrirModalTarefa(\''+obra.ID+'\')">+ Tarefa</button>'
    +'</div></div>';
  if (pendentes.length) {
    html += '<div class="sec-header"><span class="sec-title">Tarefas pendentes</span><span class="sec-count">'+pendentes.length+'</span></div>';
    tipos.forEach(tipo => {
      const g = pendentes.filter(t => t.Tipo===tipo); if (!g.length) return;
      html += '<div class="sec-divider"><div class="sec-divider-line"></div><span class="sec-divider-text '+TIPO_CLS[tipo]+'" style="border-radius:6px;padding:2px 8px">'+tipo+'</span><div class="sec-divider-line"></div></div>';
      g.forEach(t => { html += renderTarefaDetalhe(t); });
    });
  } else {
    html += '<div class="empty" style="padding:24px"><div class="empty-text" style="font-size:14px">Nenhuma tarefa pendente.<br><small>Toque em + Tarefa para adicionar.</small></div></div>';
  }
  if (concluidas.length) {
    html += '<div class="sec-divider"><div class="sec-divider-line"></div><span class="sec-divider-text">Concluídas ('+concluidas.length+')</span><div class="sec-divider-line"></div></div>';
    concluidas.forEach(t => { html += renderTarefaDetalhe(t); });
  }
  document.getElementById('detail-content').innerHTML = html;
}

function renderTarefaDetalhe(t) {
  const concluida = t.Status === 'Concluida';
  let dateStr = '';
  if (t.DataLimite) dateStr = new Date(t.DataLimite).toLocaleDateString('pt-BR',{day:'numeric',month:'short'});
  return '<div class="tarefa-card'+(concluida?' concluida':'')+'">'
    +'<div style="display:flex;align-items:flex-start;gap:10px">'
    +'<div class="check-circle'+(concluida?' done':'')+'" onclick="toggleTarefa(\''+t.ID+'\')">'+(concluida?'✓':'')+'</div>'
    +'<div style="flex:1;min-width:0">'
    +'<div class="tarefa-desc" style="'+(concluida?'text-decoration:line-through':'')+'">'+t.Descricao+'</div>'
    +(t.Observacoes?'<div style="font-size:12px;color:var(--text3);margin-top:2px">'+t.Observacoes+'</div>':'')
    +'<div class="tarefa-footer" style="margin-top:6px">'
    +(dateStr?'<span style="font-size:12px;color:var(--text3)">'+dateStr+'</span>':'')
    +'<span style="font-size:12px;color:var(--text3)">'+( t.Responsavel||'')+'</span>'
    +'<button class="edit-btn" onclick="editarTarefa(\''+t.ID+'\')">✏️ editar</button>'
    +'</div></div></div></div>';
}

async function toggleTarefa(id) {
  const t = tarefas.find(x => x.ID===id); if (!t) return;
  const novo = t.Status==='Concluida'?'Pendente':'Concluida';
  try {
    await api({action:'updateTarefa',id,status:novo});
    t.Status = novo;
    const obra = obras.find(o => o.ID===t.ObraID);
    if (obra) renderDetalheObra(obra);
    renderHome();
  } catch(e) { alert('Erro: '+e.message); }
}

function preencherSelects() {
  ['obra-responsavel','tarefa-responsavel'].forEach(id => {
    const sel = document.getElementById(id); if (!sel) return;
    sel.innerHTML = responsaveis.map(r => '<option>'+r+'</option>').join('');
  });
}

function abrirModalObra() {
  document.getElementById('obra-id-edit').value = '';
  document.getElementById('obra-modal-title').textContent = 'Nova obra';
  ['obra-unidade','obra-desc','obra-rc','obra-pedido','obra-nf','obra-obs','obra-contato'].forEach(id => document.getElementById(id).value='');
  document.getElementById('obra-status').value = 'Em execucao';
  preencherSelects();
  document.getElementById('modal-obra').classList.add('open');
}

function editarObra(id) {
  const obra = obras.find(o => o.ID===id); if (!obra) return;
  document.getElementById('obra-id-edit').value = obra.ID;
  document.getElementById('obra-modal-title').textContent = 'Editar obra';
  document.getElementById('obra-unidade').value = obra.Unidade||'';
  document.getElementById('obra-desc').value = obra.Descricao||'';
  document.getElementById('obra-tipo').value = obra.Tipo||'Servico';
  document.getElementById('obra-origem').value = obra.Origem||'Cogna';
  document.getElementById('obra-status').value = obra.Status||'Em execucao';
  document.getElementById('obra-contato').value = obra.Contato||'';
  document.getElementById('obra-rc').value = obra.RC||'';
  document.getElementById('obra-pedido').value = obra.Pedido||'';
  document.getElementById('obra-nf').value = obra.NotaFiscal||'';
  document.getElementById('obra-obs').value = obra.Observacoes||'';
  preencherSelects();
  document.getElementById('obra-responsavel').value = obra.Responsavel||'Leonardo';
  document.getElementById('modal-obra').classList.add('open');
}

async function salvarObra() {
  const id = document.getElementById('obra-id-edit').value;
  const p = {
    unidade:document.getElementById('obra-unidade').value.trim(),
    descricao:document.getElementById('obra-desc').value.trim(),
    tipo:document.getElementById('obra-tipo').value,
    origem:document.getElementById('obra-origem').value,
    status:document.getElementById('obra-status').value,
    contato:document.getElementById('obra-contato').value.trim(),
    responsavel:document.getElementById('obra-responsavel').value,
    rc:document.getElementById('obra-rc').value.trim(),
    pedido:document.getElementById('obra-pedido').value.trim(),
    notaFiscal:document.getElementById('obra-nf').value.trim(),
    observacoes:document.getElementById('obra-obs').value.trim()
  };
  if (!p.unidade||!p.descricao) { alert('Preencha Unidade e Descrição.'); return; }
  try {
    if (id) {
      await api({action:'updateObra',id,...p});
      const idx = obras.findIndex(o => o.ID===id);
      if (idx>=0) obras[idx]={...obras[idx],Unidade:p.unidade,Descricao:p.descricao,Tipo:p.tipo,Origem:p.origem,Status:p.status,Contato:p.contato,Responsavel:p.responsavel,RC:p.rc,Pedido:p.pedido,NotaFiscal:p.notaFiscal,Observacoes:p.observacoes};
    } else {
      const r = await api({action:'addObra',...p});
      obras.push({ID:r.id,Unidade:p.unidade,Descricao:p.descricao,Tipo:p.tipo,Origem:p.origem,Status:p.status,Contato:p.contato,Responsavel:p.responsavel,RC:p.rc,Pedido:p.pedido,NotaFiscal:p.notaFiscal,Observacoes:p.observacoes});
    }
    fecharModal('modal-obra'); renderObras();
    if (currentPage==='detail'&&id===currentObraId) { const obra=obras.find(o=>o.ID===id); if(obra) renderDetalheObra(obra); }
  } catch(e) { alert('Erro: '+e.message); }
}

function abrirModalTarefa(obraId) {
  document.getElementById('tarefa-id-edit').value = '';
  document.getElementById('tarefa-obra-id').value = obraId;
  document.getElementById('tarefa-desc').value = '';
  document.getElementById('tarefa-obs').value = '';
  document.getElementById('tarefa-data').value = '';
  document.getElementById('tarefa-modal-title').textContent = 'Nova tarefa';
  document.getElementById('btn-excluir-tarefa').style.display = 'none';
  preencherSelects();
  document.getElementById('modal-tarefa').classList.add('open');
}

function editarTarefa(tarefaId) {
  const t = tarefas.find(x => x.ID===tarefaId); if (!t) return;
  document.getElementById('tarefa-id-edit').value = t.ID;
  document.getElementById('tarefa-obra-id').value = t.ObraID;
  document.getElementById('tarefa-desc').value = t.Descricao||'';
  document.getElementById('tarefa-tipo').value = t.Tipo||'Administrativo';
  document.getElementById('tarefa-data').value = t.DataLimite||'';
  document.getElementById('tarefa-obs').value = t.Observacoes||'';
  preencherSelects();
  document.getElementById('tarefa-responsavel').value = t.Responsavel||'Leonardo';
  document.getElementById('tarefa-modal-title').textContent = 'Editar tarefa';
  document.getElementById('btn-excluir-tarefa').style.display = 'block';
  document.getElementById('modal-tarefa').classList.add('open');
}

async function salvarTarefa() {
  const id = document.getElementById('tarefa-id-edit').value;
  const p = {
    obraId:document.getElementById('tarefa-obra-id').value,
    descricao:document.getElementById('tarefa-desc').value.trim(),
    tipo:document.getElementById('tarefa-tipo').value,
    responsavel:document.getElementById('tarefa-responsavel').value,
    dataLimite:document.getElementById('tarefa-data').value,
    observacoes:document.getElementById('tarefa-obs').value.trim()
  };
  if (!p.descricao) { alert('Preencha a descrição.'); return; }
  try {
    if (id) {
      await api({action:'updateTarefa',id,descricao:p.descricao,tipo:p.tipo,responsavel:p.responsavel,dataLimite:p.dataLimite,observacoes:p.observacoes});
      const idx = tarefas.findIndex(t => t.ID===id);
      if (idx>=0) tarefas[idx]={...tarefas[idx],Descricao:p.descricao,Tipo:p.tipo,Responsavel:p.responsavel,DataLimite:p.dataLimite,Observacoes:p.observacoes};
    } else {
      const r = await api({action:'addTarefa',...p});
      tarefas.push({ID:r.id,ObraID:p.obraId,Descricao:p.descricao,Tipo:p.tipo,Responsavel:p.responsavel,DataLimite:p.dataLimite,Status:'Pendente',Observacoes:p.observacoes});
    }
    fecharModal('modal-tarefa'); renderHome();
    if (currentPage==='detail'&&p.obraId===currentObraId) { const obra=obras.find(o=>o.ID===p.obraId); if(obra) renderDetalheObra(obra); }
  } catch(e) { alert('Erro: '+e.message); }
}

async function excluirTarefa() {
  const id = document.getElementById('tarefa-id-edit').value; if (!id) return;
  if (!confirm('Excluir esta tarefa? Não dá pra desfazer.')) return;
  try {
    await api({action:'deleteTarefa',id});
    tarefas = tarefas.filter(t => t.ID!==id);
    fecharModal('modal-tarefa'); renderHome();
    if (currentPage==='detail'&&currentObraId) { const obra=obras.find(o=>o.ID===currentObraId); if(obra) renderDetalheObra(obra); }
  } catch(e) { alert('Erro: '+e.message); }
}

function renderResponsaveis() {
  const el = document.getElementById('lista-responsaveis');
  if (!el) return;
  if (!responsaveis.length) { el.innerHTML = '<div style="font-size:13px;color:var(--text3)">Nenhum responsável cadastrado.</div>'; return; }
  el.innerHTML = responsaveis.map(r =>
    '<div style="display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:var(--surface2);border-radius:8px;margin-bottom:6px">'
    +'<span style="font-size:14px">'+r+'</span>'
    +'<button onclick="removerResponsavel(this.dataset.nome)" data-nome="'+r+'" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;padding:2px 6px">✕</button>'
    +'</div>'
  ).join('');
}

async function adicionarResponsavel() {
  const input = document.getElementById('novo-responsavel');
  const nome = input.value.trim();
  if (!nome) { alert('Digite um nome.'); return; }
  if (responsaveis.includes(nome)) { alert('Já existe.'); return; }
  try {
    await api({action:'addResponsavel', nome});
    responsaveis.push(nome);
    input.value = '';
    preencherSelects();
    renderResponsaveis();
  } catch(e) { alert('Erro: '+e.message); }
}

function removerResponsavel(btn) {
  const nome = btn.dataset ? btn.dataset.nome : btn;
  if (!confirm('Remover "'+nome+'" da lista?')) return;
  responsaveis = responsaveis.filter(r => r !== nome);
  preencherSelects();
  renderResponsaveis();
}

function fecharModal(id) { document.getElementById(id).classList.remove('open'); }

function openShare() {
  const hoje = new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'});
  const pendentes = tarefas.filter(t => t.Status!=='Concluida');
  let txt = '📋 NK SOLUÇÕES — PAINEL OPERACIONAL\n'+hoje+'\n\n';
  txt += '🏗️ OBRAS ATIVAS: '+obras.length+'\n\n';
  if (pendentes.length) {
    txt += '⚡ TAREFAS PENDENTES ('+pendentes.length+')\n';
    pendentes.forEach(t => {
      const obra = obras.find(o => o.ID===t.ObraID);
      const local = obra?obra.Unidade:t.ObraID;
      const data = t.DataLimite?' ['+new Date(t.DataLimite).toLocaleDateString('pt-BR')+']':'';
      txt += '• '+local+': '+t.Descricao+data+' ('+(t.Responsavel||'')+')\n';
    });
  }
  txt += '\n—\nGerado pelo NK Painel Operacional';
  document.getElementById('share-text').value = txt;
  document.getElementById('modal-share').classList.add('open');
}

async function copiarShare() {
  const txt = document.getElementById('share-text').value;
  try { await navigator.clipboard.writeText(txt); } catch(e) { document.getElementById('share-text').select(); document.execCommand('copy'); }
  alert('Copiado! Cole no WhatsApp.');
}

document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target===el) el.classList.remove('open'); });
});
</script>
</body>
</html>
